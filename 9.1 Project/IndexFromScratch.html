<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet">
    <style>

        *{
            margin: 0;
            padding: 0;
            font-family: 'Sono', sans-serif;
        }

        .container{
            margin: 20px;
            height: 100vh;
            display: flex;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .card{
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: rgb(234, 231, 231);

            flex : 1;
            max-width: 400px;
            border-radius: 15px;
            padding: 15px;

            transition: 0.5s;
        }

        .heading{
            font-size: x-large;
            font-weight: bold;
        }
        
        .subHeading{
            font-size: xx-large;
            margin-bottom: 20px;
            font-weight: bolder;
        }

        button{
            font-family :'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            border: none;
            border-radius: 15px;
            width: 100px;
            height: 50px;
            background-color: yellow;
        }

        button:hover{
            border: 2px solid black;
        }

        .card:hover{
            transform:scale(1.05)
        }

        .plan_features{
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .plan_features li{
            text-align: center;
            margin-bottom: 20px;
            font-weight :500;
        }

        @media (max-width : 1250px){
            .container{
                flex-direction: column;
                height: 100%;
            }
        }
        
    </style>
</head>
<body>
    <div class="container">

        <div class="card">
            <div class="heading">Basic</div>
            <div class="subHeading">$11.99/month</div>
            <ul class="plan_features">
            <li>✅ 10GB Storage</li>
            <li>✅ 1 User</li>
            <li>🚫 Support</li>
            </ul>
            <button> Sign Up </button>
        </div>

        <div class="card">
            <div class="heading">Standard</div>
            <div class="subHeading">$19.99/month</div>
            <ul class="plan_features">
            <li>✅ 50GB Storage</li>
            <li>✅ 5 User</li>
            <li>✅ Phone & Email Support</li>
            </ul>
            <button> Sign Up </button>
        </div>

        <div class="card">
            <div class="heading">Premium</div>
            <div class="subHeading">$49.99/month</div>
            <ul class="plan_features">
            <li>✅ 10GB Storage</li>
            <li>✅ 10 User</li>
            <li>✅ 24/7 Support</li>
            </ul>
            <button> Sign Up </button>
        </div>

    </div>
</body>
</html>

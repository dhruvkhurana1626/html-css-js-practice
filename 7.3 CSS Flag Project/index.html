<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Write your CSS Code here */

    .flag {
  height: 600px;
  width: 900px;
  background-color: #CE1126; /* red */
  position: relative;
}

/* Blue stripe */
.flag > div {
  height: 300px;
  width: 100%;
  background-color: #002868; /* blue */
  position: absolute;
  top: 150px;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* White circle */
.flag > div > div {
  height: 200px;
  width: 200px;
  background-color: white;
  border-radius: 50%;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* Text inside circle */
.flag > div > div > p {
  color: black;
  font-size: 2rem;
  margin: 0;
}

/* Top text */
.flag > p {
  color: white;
  font-size: 3rem;
  text-align: center;
  margin: 0;
  padding-top: 20px;
}


  </style>
</head>

<!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors 
and CSS specificity instead.
Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
Hint 2: You can use CSS inspection to get the colors from
https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
